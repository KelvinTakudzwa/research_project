; ============================================================
; Solar Diagnostics System — SIL Sensor Validation
; PlatformIO Project Configuration (Wokwi SIL Test)
;
; Build:   pio run -e wokwi_sil_test
; Wokwi:   Open this folder in VS Code — extension auto-detects
;          platformio.ini and builds before simulation launch.
; ============================================================

[env:wokwi_sil_test]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial monitor
monitor_speed = 115200
upload_speed  = 921600

; ── Build flags ─────────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=0

; ── Third-party library dependencies ────────────────────────
; No WiFi / MQTT / TLS — sensor acquisition subsystem only.
lib_deps =
    adafruit/RTClib @ ^2.1.4                ; DS3231 RTC (timestamp source)
    bblanchon/ArduinoJson @ ^6.21.5         ; JSON payload serialisation
    claws/BH1750 @ ^1.3.0                   ; BH1750 irradiance sensor
    milesburton/DallasTemperature @ ^3.11.0 ; DS18B20 temperature probe
    paulstoffregen/OneWire @ ^2.3.8         ; 1-Wire bus driver
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4 ; LCD1602 I2C display
