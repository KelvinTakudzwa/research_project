; ============================================================
; Solar Diagnostics System — ESP32 Production Firmware
; PlatformIO Project Configuration
;
; Build:   pio run -e esp32_main
; Upload:  pio run -e esp32_main --target upload
; Monitor: pio device monitor --baud 115200
; ============================================================

[env:esp32_main]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial monitor
monitor_speed  = 115200
upload_speed   = 921600

; Partition scheme: default with OTA + LittleFS (16MB flash variant)
board_build.partitions = default.csv

; ── Build flags ─────────────────────────────────────────────
build_flags =
    -DPZEM_ENABLED=0          ; Set to 1 when PZEM-004T hardware is connected
    -DCORE_DEBUG_LEVEL=0      ; 0=None 1=Error 2=Warn 3=Info 4=Debug 5=Verbose
    -DBOARD_HAS_PSRAM=0

; ── Third-party library dependencies ────────────────────────
; All ESP32 core libraries (WiFi, Wire, LittleFS, Preferences,
; WiFiClientSecure) are bundled with espressif32 — no entry needed.
lib_deps =
    256dpi/MQTT @ ^2.5.2                    ; Joel Gaehwiler — true QoS 1 PUBACK
    adafruit/RTClib @ ^2.1.4                ; DS3231 hardware RTC
    bblanchon/ArduinoJson @ ^6.21.5         ; JSON serialisation
    claws/BH1750 @ ^1.3.0                   ; I2C irradiance sensor
    milesburton/DallasTemperature @ ^3.11.0 ; DS18B20 temperature probe
    paulstoffregen/OneWire @ ^2.3.8         ; 1-Wire bus driver
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4 ; LCD1602 I2C display

; Optional — uncomment when PZEM_ENABLED=1
; olehs/PZEM004Tv30 @ ^1.1.2
