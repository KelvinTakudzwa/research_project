# Mosquitto MQTT Broker Configuration — MQTTS (TLS 1.2 on port 8883)
#
# All sensor payloads are encrypted in transit using TLS 1.2.
# Clients authenticate the broker via the self-signed CA certificate.
# Run scripts/generate_certs.sh once to populate mosquitto/certs/.

listener 8883 0.0.0.0
protocol mqtt

# TLS configuration
cafile   /mosquitto/config/certs/ca.crt
certfile /mosquitto/config/certs/server.crt
keyfile  /mosquitto/config/certs/server.key
tls_version tlsv1.2

# Clients are not required to present their own certificate (server-auth only)
require_certificate false
allow_anonymous true

# Persistent sessions: store QoS 1 messages for offline subscribers
persistence true
persistence_location ./mqtt_data/
