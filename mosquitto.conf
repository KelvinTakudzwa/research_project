# Mosquitto MQTT Broker Configuration
# Phase 8: MQTT Protocol Upgrade
#
# IMPORTANT: This config is required for Mosquitto 2.0+
# By default, Mosquitto 2.0 binds to localhost ONLY and requires auth,
# which blocks the ESP32 on the local LAN.
#
# This config opens the broker to the full local network (0.0.0.0)
# and allows anonymous connections for the prototype environment.

listener 1883 0.0.0.0
allow_anonymous true

# Persistent sessions: store QoS 1 messages for offline subscribers
# (e.g., if Node.js restarts, it gets missed messages on reconnect)
persistence true
persistence_location ./mqtt_data/
