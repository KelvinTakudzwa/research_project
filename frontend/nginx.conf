# Nginx configuration for serving React PWA and reverse-proxying API calls
server {
    listen 80;
    server_name localhost;

    # Serve static files from the React build
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        
        # SPA routing: if file not found, fallback to index.html
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy /api to the Node.js backend container
    # Uses Docker's internal DNS resolver to route to the 'backend' service
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
