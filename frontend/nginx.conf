# Nginx configuration for serving React PWA and reverse-proxying API calls
server {
    listen 80;
    server_name localhost;

    # Serve static files from the React build
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        
        # SPA routing: if file not found, fallback to index.html
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy /api to the Node.js backend container
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse proxy /auth to the Node.js backend container (login endpoint)
    location /auth/ {
        proxy_pass http://backend:5000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket upgrade for Socket.IO real-time telemetry push
    location /socket.io/ {
        proxy_pass         http://backend:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
    }
}
